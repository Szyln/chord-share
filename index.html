<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8kbps （はっせん）リスト</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/variables.css" />
    <link rel="stylesheet" href="./style/body.css" />
    <link rel="stylesheet" href="./style/sidebar.css" />
    <link rel="stylesheet" href="./style/headerAndFooter.css" />
    <link rel="stylesheet" href="./style/util.css" />
    <link rel="stylesheet" href="./style/search.css" />
    <link rel="stylesheet" href="./style/tabs.css" />
    <link rel="stylesheet" href="./style/filters.css" />
    <link rel="stylesheet" href="./style/grid.css" />
    <link rel="stylesheet" href="./style/song-item.css" />
    <link rel="stylesheet" href="./style/badges.css" />
    <link rel="stylesheet" href="./style/buttons.css" />
    
    <script src="./script/config.js"></script>
    <script src="./script/sidebar.js"></script>
  </head>
  <body>
    <div class="controls-header">
      <div class="header-title-wrapper">
        <button
          class="action-btn icon-only menu-toggle"
          onclick="toggleDrawer()"
          title="選單"
        >
          <span class="material-symbols-outlined menu-icon"
            >menu</span
          >
        </button>
        <h1 id="page-title" class="header-title">
          8kbps （はっせん）リスト
        </h1>

        <div class="social-links">
          <a
            href="#"
            id="global-x-link"
            target="_blank"
            class="social-icon"
            title="X (Twitter)"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
              />
            </svg>
          </a>
          <a
            href="#"
            id="global-yt-link"
            target="_blank"
            class="social-icon yt"
            title="YouTube"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M21.582 6.186a2.684 2.684 0 0 0-1.884-1.895C17.973 3.846 12 3.846 12 3.846s-5.973 0-7.698.445a2.684 2.684 0 0 0-1.884 1.895C1.964 7.915 1.964 12 1.964 12s0 4.085.454 5.814a2.684 2.684 0 0 0 1.884 1.895c1.725.445 7.698.445 7.698.445s5.973 0 7.698-.445a2.684 2.684 0 0 0 1.884-1.895c.454-1.729.454-5.814.454-5.814s0-4.085-.454-5.814zM9.96 15.485V8.515L15.96 12l-6 3.485z"
              />
            </svg>
          </a>
        </div>
      </div>

      <div class="header-actions">
        <button
          class="action-btn icon-only"
          onclick="toggleTheme()"
          title="切換深淺色"
        >
          <span class="material-symbols-outlined" id="theme-icon"
            >dark_mode</span
          >
        </button>
        <button class="action-btn" onclick="toggleLang()">
          <span class="material-symbols-outlined">translate</span>
          <span id="lang-btn-text">中文</span>
        </button>
      </div>
    </div>

    <div class="search-bar-container">
      <div class="search-wrapper">
        <input
          type="text"
          id="search"
          placeholder="曲名、作者で検索..."
          autocomplete="off"
        />
        <div id="search-candidates" class="candidates-dropdown"></div>
      </div>
      <button class="view-toggle-btn" onclick="toggleViewMode()">
        <span class="material-symbols-outlined">swap_horiz</span>
        <span id="view-toggle-text">完成度別へ切替</span>
      </button>
    </div>

    <div class="filter-group" id="dynamic-filters"></div>

    <div class="tabs-wrapper">
      <div id="tabs" class="tabs-container"></div>
    </div>

    <div id="app" class="grid-container">
      <div id="loading">データベースから読み込み中...</div>
    </div>

    <footer class="site-footer">
      &copy; <span id="current-year">2026</span> 8kbps toolbox. All rights
      reserved.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/wanakana@5.3.1/wanakana.min.js"></script>
    <script>
      const GAS_URL = window.AppConfig.gasUrl;

      const i18n = {
        ja: {
          title: "8kbps （はっせん）リスト",
          searchPlaceholder: "曲名、作者で検索...",
          switchToCompletion: "完成度別へ",
          switchToGenre: "ジャンル別へ",
          langBtn: "中文",
          loading: "データベースから読み込み中...",
          noData: "条件に一致する曲がありません。",
          allFilter: "すべて",
          diffBtn: "音域",
          ytBtn: "動画",
          noLink: "リンクなし",
        },
        zh: {
          title: "8kbps （はっせん）歌單",
          searchPlaceholder: "搜尋曲名、作者...",
          switchToCompletion: "切換為完成度分類",
          switchToGenre: "切換為類型分類",
          langBtn: "日本語",
          loading: "正在從資料庫載入資料，請稍候...",
          noData: "找不到符合的歌曲。",
          allFilter: "全部",
          diffBtn: "音域",
          ytBtn: "影片",
          noLink: "無",
        },
      };

      let currentLang = localStorage.getItem("appLang") || "ja";
      let viewMode = "genre";

      let allSongs = [];
      let filteredSongs = [];

      let parsedData = {};
      let tabList = [];
      let currentTab = "";

      let availableCompletions = new Set();
      let availableGenres = new Set();

      let selectedCompletionFilters = [];
      let selectedGenreFilter = "all";

      function getCompLevel(compStr) {
        const match = compStr.match(/^(\d+)/);
        return match ? parseInt(match[1], 10) : -1;
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("appTheme");
        let isDark;
        if (savedTheme) {
          isDark = savedTheme === "dark";
        } else {
          isDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
        }
        const themeToSet = isDark ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", themeToSet);
        document.getElementById("theme-icon").innerText = isDark
          ? "light_mode"
          : "dark_mode";
      }

      function toggleTheme() {
        const current = document.documentElement.getAttribute("data-theme");
        const target = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", target);
        document.getElementById("theme-icon").innerText =
          target === "dark" ? "light_mode" : "dark_mode";
        localStorage.setItem("appTheme", target);
      }

      async function init() {
        initTheme();
        applyI18n();
        // 新增這行：呼叫 sidebar.js 來生成側邊欄
        window.renderSidebar();

        initTheme();
        applyI18n();

        // 動態綁定共用社群連結
        const xLink = document.getElementById("global-x-link");
        const ytLink = document.getElementById("global-yt-link");
        if (xLink) xLink.href = window.AppConfig.xUrl;
        if (ytLink) ytLink.href = window.AppConfig.youtubeUrl;

        document.getElementById("current-year").innerText =
          new Date().getFullYear();

        // 自動設定 Footer 年份
        document.getElementById("current-year").innerText =
          new Date().getFullYear();

        try {
          const response = await fetch(GAS_URL);
          allSongs = await response.json();

          allSongs.forEach((song) => {
            if (song["完成度"] && song["完成度"].text.trim() !== "") {
              availableCompletions.add(song["完成度"].text.trim());
            }
            if (song["ジャンル"] && song["ジャンル"].text.trim() !== "") {
              const genres = song["ジャンル"].text
                .split(/[,、]/)
                .map((g) => g.trim())
                .filter(Boolean);
              genres.forEach((g) => availableGenres.add(g));
            }
          });

          initDefaultCompletionFilters();
          renderDynamicFilters();
          triggerSearch();
        } catch (error) {
          console.error(error);
          document.getElementById("loading").innerHTML =
            `<span class="text-error">Failed</span>`;
        }
      }

      function initDefaultCompletionFilters() {
        selectedCompletionFilters = [];
        availableCompletions.forEach((comp) => {
          if (getCompLevel(comp) >= 4) {
            selectedCompletionFilters.push(comp);
          }
        });
        if (
          selectedCompletionFilters.length === 0 ||
          selectedCompletionFilters.length === availableCompletions.size
        ) {
          selectedCompletionFilters = Array.from(availableCompletions);
        }
      }

      function processAndRender() {
        parsedData = {};
        const tabSet = new Set();

        filteredSongs.forEach((song) => {
          const genresRaw =
            song["ジャンル"] && song["ジャンル"].text.trim() !== ""
              ? song["ジャンル"].text
              : "未分類";
          const authorsRaw =
            song["作者"] && song["作者"].text.trim() !== ""
              ? song["作者"].text
              : "未分類";
          const compRaw =
            song["完成度"] && song["完成度"].text.trim() !== ""
              ? song["完成度"].text
              : "未設定";

          const genres = genresRaw
            .split(/[,、]/)
            .map((g) => g.trim())
            .filter(Boolean);
          const authors = authorsRaw
            .split(/[,、]/)
            .map((a) => a.trim())
            .filter(Boolean);

          if (viewMode === "genre") {
            genres.forEach((genre) => {
              tabSet.add(genre);
              if (!parsedData[genre]) parsedData[genre] = {};
              authors.forEach((author) => {
                if (!parsedData[genre][author]) parsedData[genre][author] = [];
                parsedData[genre][author].push(song);
              });
            });
          } else {
            tabSet.add(compRaw);
            if (!parsedData[compRaw]) parsedData[compRaw] = {};
            authors.forEach((author) => {
              if (!parsedData[compRaw][author])
                parsedData[compRaw][author] = [];
              parsedData[compRaw][author].push(song);
            });
          }
        });

        tabList = Array.from(tabSet);
        if (viewMode === "genre") {
          tabList.sort();
        } else {
          tabList.sort((a, b) => b.localeCompare(a));
        }

        if (tabList.length > 0) {
          if (!tabList.includes(currentTab)) {
            currentTab = tabList[0];
          }

          for (const t in parsedData) {
            for (const sub in parsedData[t]) {
              if (viewMode === "genre") {
                parsedData[t][sub].sort((a, b) => {
                  const cA = a["完成度"] ? String(a["完成度"].text) : "";
                  const cB = b["完成度"] ? String(b["完成度"].text) : "";
                  return cB.localeCompare(cA);
                });
              } else {
                parsedData[t][sub].sort((a, b) => {
                  const gA = a["ジャンル"] ? String(a["ジャンル"].text) : "";
                  const gB = b["ジャンル"] ? String(b["ジャンル"].text) : "";
                  return gA.localeCompare(gB);
                });
              }
            }
          }

          document.getElementById("tabs").style.display = "flex";
          renderTabs();
          renderGrid(parsedData[currentTab]);
        } else {
          document.getElementById("tabs").style.display = "none";
          document.getElementById("app").innerHTML =
            `<div id="loading">${i18n[currentLang].noData}</div>`;
        }
      }

      function renderTabs() {
        const tabsDiv = document.getElementById("tabs");
        tabsDiv.innerHTML = "";

        tabList.forEach((tabName) => {
          const btn = document.createElement("button");
          btn.className = `tab-btn ${tabName === currentTab ? "active" : ""}`;
          btn.textContent = tabName;
          btn.onclick = () => {
            currentTab = tabName;
            renderTabs();
            renderGrid(parsedData[currentTab]);
          };
          tabsDiv.appendChild(btn);
        });
      }

      let isSingleSelectMode = false;
      let lastClickedLevel = -1;

      function renderDynamicFilters() {
        const container = document.getElementById("dynamic-filters");
        container.innerHTML = "";

        if (viewMode === "genre") {
          const sortedComps = Array.from(availableCompletions).sort((a, b) =>
            b.localeCompare(a),
          );

          sortedComps.forEach((comp) => {
            const isSelected = selectedCompletionFilters.includes(comp);
            const btn = document.createElement("button");
            btn.className = `filter-btn ${isSelected ? "active" : ""}`;
            btn.textContent = comp;

            btn.onclick = () => {
              const clickedLevel = getCompLevel(comp);
              selectedCompletionFilters = [];

              if (clickedLevel === lastClickedLevel && !isSingleSelectMode) {
                isSingleSelectMode = true;
                selectedCompletionFilters = [comp];
              } else {
                isSingleSelectMode = false;
                lastClickedLevel = clickedLevel;

                availableCompletions.forEach((c) => {
                  if (getCompLevel(c) >= clickedLevel) {
                    selectedCompletionFilters.push(c);
                  }
                });
              }

              triggerSearch();
              renderDynamicFilters();
            };
            container.appendChild(btn);
          });
        } else {
          const allBtn = document.createElement("button");
          allBtn.className = `filter-btn ${selectedGenreFilter === "all" ? "active" : ""}`;
          allBtn.textContent = i18n[currentLang].allFilter;
          allBtn.onclick = () => {
            selectedGenreFilter = "all";
            triggerSearch();
            renderDynamicFilters();
          };
          container.appendChild(allBtn);

          const sortedGenres = Array.from(availableGenres).sort();
          sortedGenres.forEach((item) => {
            const btn = document.createElement("button");
            btn.className = `filter-btn ${selectedGenreFilter === item ? "active" : ""}`;
            btn.textContent = item;
            btn.onclick = () => {
              selectedGenreFilter = item;
              triggerSearch();
              renderDynamicFilters();
            };
            container.appendChild(btn);
          });
        }
      }

      /**
       * 生成單個歌曲項目的 HTML 字串
       * 拆分此函數可確保 AI 修正時更易於辨識 HTML 結構
       */
      function getSongItemHTML(song) {
        const title = song["曲名"].text;
        const txt = i18n[currentLang];

        // 連結邏輯
        let mainUrl = (song["コード"] && song["コード"].text.trim() !== "") 
                      ? (song["コード"].url || "") 
                      : (song["橫斷検索"] ? (song["橫斷検索"].url || "") : "");

        const songLinkHTML = mainUrl
          ? `<a href="${mainUrl}" target="_blank" class="song-link"><span class="material-symbols-outlined">music_note</span>${title}</a>`
          : `<span class="song-link disabled"><span class="material-symbols-outlined">music_note</span>${title}</span>`;

        // Key 標籤邏輯
        const keyText = song["Key"] ? String(song["Key"].text).trim() : "";
        let keyBadgeHTML = "";
        if (keyText !== "0" && keyText !== "") {
          let keyNum = Number(keyText);
          let displayKey = (!isNaN(keyNum) && keyNum > 0 && !keyText.startsWith("+")) ? "+" + keyText : keyText;
          keyBadgeHTML = `<span class="key-badge">${displayKey}</span>`;
        }

        // 完成度 / 類型標籤邏輯
        let badgeHTML = "";
        if (viewMode === "genre") {
          const compText = song["完成度"] ? song["完成度"].text : "";
          const compLevel = getCompLevel(compText);
          if (compText) {
            let completionClass = "badge-genre";
            if (compLevel >= 4) completionClass = "badge-completion-high";
            else if (compLevel >= 2) completionClass = "badge-completion-medium";
            else if (compLevel >= 0) completionClass = "badge-completion-low";
            badgeHTML = `<span class="badge ${completionClass}">${compText}</span>`;
          }
        } else {
          const genreText = song["ジャンル"] ? song["ジャンル"].text : "";
          if (genreText) badgeHTML = `<span class="badge badge-genre">${genreText}</span>`;
        }

        // 按鈕邏輯
        const diffUrl = song["音域"] && song["音域"].url ? song["音域"].url : "";
        const ytUrl = song["Youtube"] && song["Youtube"].url ? song["Youtube"].url : "";

        const diffBtnHTML = diffUrl
          ? `<a href="${diffUrl}" target="_blank" class="icon-btn"><span class="material-symbols-outlined">equalizer</span>${txt.diffBtn}</a>`
          : `<span class="icon-btn disabled"><span class="material-symbols-outlined">equalizer</span>${txt.noLink}</span>`;

        const ytBtnHTML = ytUrl
          ? `<a href="${ytUrl}" target="_blank" class="icon-btn"><span class="material-symbols-outlined">smart_display</span>${txt.ytBtn}</a>`
          : `<span class="icon-btn disabled"><span class="material-symbols-outlined">smart_display</span>${txt.noLink}</span>`;

        return `
          <li class="song-item">
            <div class="song-title-wrapper">
              ${songLinkHTML} ${keyBadgeHTML}
            </div>
            <div class="song-meta-row">
              <div class="subtext-area">${badgeHTML}</div>
              <div class="btn-group">${diffBtnHTML} ${ytBtnHTML}</div>
            </div>
          </li>`;
      }

      function renderGrid(groupData) {
        const app = document.getElementById("app");
        app.innerHTML = "";

        if (!groupData) return;

        const subGroups = Object.keys(groupData).sort();

        subGroups.forEach((subGroupName) => {
          const card = document.createElement("div");
          card.className = "group-card";
          card.innerHTML = `<h3 class="group-title"><span class="material-symbols-outlined">person</span> ${subGroupName}</h3>`;

          const ul = document.createElement("ul");
          ul.className = "song-list";

          groupData[subGroupName].forEach((song) => {
            const liHTML = getSongItemHTML(song);
            ul.insertAdjacentHTML('beforeend', liHTML);
          });

          card.appendChild(ul);
          app.appendChild(card);
        });
      }

function isFuzzyMatch(text, query) {
      if (!query) return true;
      
      // 1. 將查詢字串轉為平假名 (例如 "ka" -> "か", "a" -> "あ")
      // WanaKana 可以判斷輸入的是不是羅馬拼音並轉換
      const normalizedQuery = wanakana.toHiragana(query).toLowerCase();
      
      // 2. 將目標文字也轉為平假名，確保比對基準一致
      const normalizedText = wanakana.toHiragana(text).toLowerCase();
      
      // 3. 執行模糊比對
      let i = 0, j = 0;
      while (i < normalizedText.length && j < normalizedQuery.length) {
          if (normalizedText[i] === normalizedQuery[j]) j++;
          i++;
      }
      return j === normalizedQuery.length;
    }

      function triggerSearch(updateGrid = true) {
        const keyword = document.getElementById("search").value.trim();

        filteredSongs = allSongs.filter((song) => {
          const title = song["曲名"] ? song["曲名"].text : "";
          const author = song["作者"] ? song["作者"].text : "";

          const matchSearch =
            isFuzzyMatch(title, keyword) || isFuzzyMatch(author, keyword);

          let matchFilter = true;
          if (viewMode === "genre") {
            const comp = song["完成度"] ? song["完成度"].text.trim() : "";
            matchFilter = selectedCompletionFilters.includes(comp);
          } else {
            if (selectedGenreFilter !== "all") {
              const genresRaw = song["ジャンル"] ? song["ジャンル"].text : "";
              const genres = genresRaw.split(/[,、]/).map((g) => g.trim());
              matchFilter = genres.includes(selectedGenreFilter);
            }
          }

          return matchSearch && matchFilter;
        });

        if (updateGrid) processAndRender();
      }

      function renderCandidates(keyword) {
        const dropdown = document.getElementById("search-candidates");
        if (!keyword) {
          dropdown.style.display = "none";
          return;
        }

        const matches = filteredSongs.slice(0, 50);
        if (matches.length === 0) {
          dropdown.style.display = "none";
          return;
        }

        dropdown.innerHTML = "";
        matches.forEach((song) => {
          const title = song["曲名"] ? song["曲名"].text : "";
          const author = song["作者"] ? song["作者"].text : "";

          const div = document.createElement("div");
          div.className = "candidate-item";
          div.innerHTML = `
             <span class="candidate-title">${title}</span>
             <span class="candidate-author"><span class="material-symbols-outlined" style="font-size:14px;">person</span> ${author}</span>
           `;

          div.onclick = () => {
            document.getElementById("search").value = title;
            dropdown.style.display = "none";
            triggerSearch();
          };
          dropdown.appendChild(div);
        });
        dropdown.style.display = "block";
      }

      document.getElementById("search").addEventListener("input", (e) => {
        const val = e.target.value.trim();
        triggerSearch(true);
        renderCandidates(val);
      });

      document.getElementById("search").addEventListener("focus", (e) => {
        const val = e.target.value.trim();
        if (val) renderCandidates(val);
      });

      document.addEventListener("click", (e) => {
        const wrapper = document.querySelector(".search-wrapper");
        if (wrapper && !wrapper.contains(e.target)) {
          document.getElementById("search-candidates").style.display = "none";
        }
      });

      function toggleViewMode() {
        viewMode = viewMode === "genre" ? "completion" : "genre";

        selectedGenreFilter = "all";
        initDefaultCompletionFilters();
        isSingleSelectMode = false;
        lastClickedLevel = -1;

        const txt = i18n[currentLang];
        document.getElementById("view-toggle-text").innerText =
          viewMode === "genre" ? txt.switchToCompletion : txt.switchToGenre;

        triggerSearch();
        renderDynamicFilters();
      }

      function toggleLang() {
        currentLang = currentLang === "ja" ? "zh" : "ja";
        localStorage.setItem("appLang", currentLang);
        applyI18n();
        window.updateSidebarLanguage();
        renderDynamicFilters();
        if (allSongs.length > 0) processAndRender();
      }

      function applyI18n() {
        const txt = i18n[currentLang];
        document.getElementById("page-title").innerText = txt.title;
        document.getElementById("search").placeholder = txt.searchPlaceholder;
        document.getElementById("lang-btn-text").innerText = txt.langBtn;

        const viewBtn = document.getElementById("view-toggle-text");
        if (viewBtn) {
          viewBtn.innerText =
            viewMode === "genre" ? txt.switchToCompletion : txt.switchToGenre;
        }

        const loading = document.getElementById("loading");
        if (loading && allSongs.length === 0) {
          loading.innerText = txt.loading;
        }
      }

      init();
    </script>
  </body>
</html>
